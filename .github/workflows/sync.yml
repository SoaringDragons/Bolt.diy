name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up binary files for Hugging Face
        run: |
          # Configure dummy git user for the temporary local cleanup commit
          git config --global user.email "sync@workflow.placeholder"
          git config --global user.name "Sync Workflow"
          
          # Force remove the specific icon and image folders/files blocking the push
          git rm -rf assets/icons/ || true
          git rm -rf docs/images/ || true
          git rm -f public/social_preview_index.jpg || true
          git rm -f public/boltgives.jpeg || true
          
          # Commit the changes locally so the push history is completely clean of binaries
          git commit -m "Strip binaries for Hugging Face deployment" || true

      - name: Push to HF
        run: git push --force https://SoaringDragons:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/SoaringDragons/BOLT main
