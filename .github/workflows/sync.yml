name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up history for Hugging Face
        run: |
          git config --global user.email "sync@workflow.placeholder"
          git config --global user.name "Sync Workflow"
          
          # Install the tool to rewrite history seamlessly
          sudo apt-get update && sudo apt-get install -y git-filter-repo
          
          # Forcefully purge all images, icons, and mac icons from the entire push history
          git filter-repo --invert-paths --path-glob '*.png' --path-glob '*.jpg' --path-glob '*.jpeg' --path-glob '*.ico' --path-glob '*.icns' --force

      - name: Push to HF
        run: git push --force https://SoaringDragons:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/SoaringDragons/BOLT main
