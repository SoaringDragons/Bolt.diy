name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        run: git push --force https://SoaringDragons:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/SoaringDragons/BOLT main
